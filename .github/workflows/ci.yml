name: Unified CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            web:
              - 'web/**'

  backend-ci:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build with Gradle
        run: |
          cd backend
          chmod +x ./gradlew
          ./gradlew build

  web-ci:
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    name: Web CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'
      - name: Build Web
        run: |
          cd web
          # npm install --frozen-lockfile (실제 파일이 있을 때 활성화)
          # npm run build
          echo "Web build placeholder"

  ci-success:
    needs: [backend-ci, web-ci]
    if: always()
    name: ci-success
    runs-on: ubuntu-latest
    steps:
      - name: Check Status
        run: |
          # backend-ci와 web-ci 중 하나라도 실패(failure)했으면 종료 코드 1 반환
          if [[ "${{ needs.backend-ci.result }}" == "failure" || "${{ needs.web-ci.result }}" == "failure" ]]; then
            echo "CI Failed"
            exit 1
          fi
          echo "All required jobs passed or skipped."
